kind = "web"
previewPath = "/"
title = "Cyber Tools Hub"
version = "1.0.0"
id = "artifacts/cyber-tools-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25970

[services.development]
run = "pnpm --filter @workspace/cyber-tools-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-tools-hub", "run", "build" ]
publicDir = "artifacts/cyber-tools-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25970"
BASE_PATH = "/"
